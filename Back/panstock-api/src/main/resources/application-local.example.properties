# =========================================================
# PanStock API - application-local.properties example
# Copy this file to application-local.properties.
# The real application-local.properties is ignored by git.
# =========================================================

server.port=8081

# =========================================================
# LOCAL DATABASE
# =========================================================
spring.datasource.url=jdbc:mariadb://localhost:3306/panstock_db
spring.datasource.username=panstock_user
spring.datasource.password=panstock123
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

# =========================================================
# JPA / HIBERNATE
# =========================================================
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# =========================================================
# JWT
# =========================================================
application.security.jwt.secretKey=replace-with-local-secret
application.security.jwt.expiration=86400000

# =========================================================
# TIMEZONE
# =========================================================
spring.jackson.time-zone=America/Argentina/Buenos_Aires
