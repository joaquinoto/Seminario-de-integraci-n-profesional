# =========================================================
# ZONA HORARIA
#
# Fuerza a la JVM a usar siempre la hora de Buenos Aires,
# independientemente de la zona configurada en el servidor
# o contenedor Docker.
#
# Esto garantiza que LocalDate.now() en los servicios
# devuelva la fecha correcta para el negocio en Argentina,
# evitando que a partir de las 21:00 hs el backend
# "adelante" la fecha al día siguiente (diferencia UTC-3).
#
# Si se prefiere no tocar el sistema operativo, el mismo
# efecto se logra pasando la propiedad al lanzar el JAR:
#   java -Duser.timezone=America/Argentina/Buenos_Aires -jar panstock-api.jar
# =========================================================
spring.jackson.time-zone=America/Argentina/Buenos_Aires