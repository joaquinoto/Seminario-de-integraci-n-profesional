# =========================================================
# PanStock API - application.properties example
# Copy this file to application.properties or configure the same values
# through environment variables.
# =========================================================

spring.application.name=panstock-api
server.port=${SERVER_PORT:8081}

spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

# =========================================================
# DATABASE
# =========================================================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mariadb://localhost:3306/panstock_db}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.mariadb.jdbc.Driver}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:panstock_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:panstock123}

# =========================================================
# JPA / HIBERNATE
# =========================================================
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# =========================================================
# JWT
# =========================================================
application.security.jwt.secretKey=${JWT_SECRET:replace-with-local-secret}
application.security.jwt.expiration=${JWT_EXPIRATION:86400000}

# =========================================================
# TIMEZONE
# =========================================================
spring.jackson.time-zone=America/Argentina/Buenos_Aires
