# =========================================================
# PanStock API - production profile example
# Copy this file to application-prod.properties on the target environment,
# or configure equivalent environment variables.
# =========================================================

server.port=${SERVER_PORT:8080}

# =========================================================
# DATABASE
# =========================================================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://host:5432/database}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.postgresql.Driver}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD}

# =========================================================
# JPA / HIBERNATE
# =========================================================
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=America/Argentina/Buenos_Aires

# =========================================================
# JWT
# =========================================================
application.security.jwt.secretKey=${JWT_SECRET}
application.security.jwt.expiration=${JWT_EXPIRATION:86400000}

# =========================================================
# TIMEZONE
# =========================================================
spring.jackson.time-zone=America/Argentina/Buenos_Aires
server.servlet.session.timeout=30m

# =========================================================
# JDBC POOL
# =========================================================
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000

spring.jpa.properties.hibernate.boot.allow_jdbc_metadata_access=false
spring.jpa.defer-datasource-initialization=true
